<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<title>Quiz Sustentable</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;900&family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Open Sans',sans-serif;
color:white;
background: linear-gradient(-45deg,#1b5e20,#1976d2,#2e7d32,#42a5f5);
background-size:400% 400%;
animation:fondo 12s ease infinite;
text-align:center;
}

@keyframes fondo{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

.container{
max-width:700px;
margin:auto;
padding:40px 20px;
}

h1{
font-family:'Montserrat';
font-size:2.5em;
}

.quiz-box{
background:rgba(255,255,255,0.9);
color:#333;
padding:30px;
border-radius:20px;
box-shadow:0 20px 40px rgba(0,0,0,0.3);
margin-top:30px;
}

.question{
font-size:1.4em;
margin-bottom:20px;
}

button{
display:block;
width:100%;
margin:10px 0;
padding:12px;
border:none;
border-radius:30px;
font-size:16px;
cursor:pointer;
background:linear-gradient(45deg,#2e7d32,#1976d2);
color:white;
font-weight:bold;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
}

.result{
font-size:1.5em;
margin-top:20px;
font-weight:bold;
}

.actions{
margin-top:20px;
display:flex;
gap:10px;
flex-wrap:wrap;
justify-content:center;
}

.actions a{
text-decoration:none;
padding:10px 20px;
border-radius:30px;
background:#1976d2;
color:white;
font-weight:bold;
}

</style>
</head>

</ul>

<body>

<div class="container">

<h1>Quiz de Movilidad Sustentable</h1>
<p>¿Qué tanto sabes sobre transporte ecológico?</p>

<div class="quiz-box">

<div id="question" class="question"></div>

<div id="answers"></div>

<div id="result" class="result"></div>

<div class="actions" id="actions" style="display:none;">

<button onclick="reiniciarQuiz()">Reiniciar Quiz</button>

<a href="https://esme9726tapia-alt.github.io/ruta_sustentable/index.html">
Volver a Inicio
</a>

</div>

</div>

</div>

<script>

const quiz=[

{
pregunta:"¿Cuál transporte contamina menos?",
respuestas:["Automóvil","Metro","Motocicleta"],
correcta:1
},

{
pregunta:"¿Cuál transporte promueve actividad física?",
respuestas:["Ecobici","Taxi","Auto"],
correcta:0
},

{
pregunta:"¿Qué transporte usa energía eléctrica?",
respuestas:["Trolebús","Camión viejo","Auto"],
correcta:0
},

{
pregunta:"¿Cuál ayuda a reducir el tráfico?",
respuestas:["Metrobus","Automóvil","Motocicleta"],
correcta:0
},

{
pregunta:"¿Qué transporte es más sustentable?",
respuestas:["Bicicleta","Auto","Motocicleta"],
correcta:0
}

];

let indice=0;
let puntos=0;

function cargarPregunta(){

document.getElementById("result").innerHTML="";

const pregunta=quiz[indice];

document.getElementById("question").innerHTML=pregunta.pregunta;

const respuestasDiv=document.getElementById("answers");
respuestasDiv.innerHTML="";

pregunta.respuestas.forEach((resp,i)=>{

let btn=document.createElement("button");

btn.innerText=resp;

btn.onclick=()=>responder(i);

respuestasDiv.appendChild(btn);

});

}

function responder(i){

if(i===quiz[indice].correcta){

puntos++;

document.body.style.background="linear-gradient(45deg,#2e7d32,#66bb6a)";

}else{

document.body.style.background="linear-gradient(45deg,#c62828,#ef5350)";

}

setTimeout(()=>{

document.body.style.background="linear-gradient(-45deg,#1b5e20,#1976d2,#2e7d32,#42a5f5)";

indice++;

if(indice<quiz.length){

cargarPregunta();

}else{

mostrarResultado();

}

},700);

}

function mostrarResultado(){

document.getElementById("question").innerHTML="Quiz terminado";

document.getElementById("answers").innerHTML="";

document.getElementById("result").innerHTML="Tu puntuación: "+puntos+" de "+quiz.length;

document.getElementById("actions").style.display="flex";

}

function reiniciarQuiz(){

indice=0;

puntos=0;

document.getElementById("actions").style.display="none";

cargarPregunta();

}

cargarPregunta();

</script>

</body>
</html>
