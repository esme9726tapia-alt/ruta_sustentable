<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RUTA SUSTENTABLE</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Open+Sans:wght@300;400&display=swap" rel="stylesheet">

<style>

:root {
    --verde: #00c853;
    --azul: #00b0ff;
    --oscuro: #0f2027;
    --oscuro2: #203a43;
    --oscuro3: #2c5364;
    --blanco: #ffffff;
}

/* FONDO FUTURISTA */
body {
    margin: 0;
    font-family: 'Open Sans', sans-serif;
    background: linear-gradient(135deg, var(--oscuro), var(--oscuro2), var(--oscuro3));
    color: white;
}

/* ===== BANNER FUTURISTA ===== */
header {
    position: relative;
    text-align: center;
    padding: 5em 1em;
    background: linear-gradient(135deg, rgba(0,200,83,0.8), rgba(0,176,255,0.8));
    overflow: hidden;
}

header::before {
    content: "";
    position: absolute;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, rgba(255,255,255,0.15) 10%, transparent 10%);
    background-size: 50px 50px;
    animation: mover 20s linear infinite;
}

@keyframes mover {
    from { transform: translate(0,0); }
    to { transform: translate(-50px,-50px); }
}

header h1 {
    font-family: 'Montserrat', sans-serif;
    font-size: 3.5em;
    letter-spacing: 3px;
    position: relative;
    z-index: 1;
}

header h2, header p {
    position: relative;
    z-index: 1;
}

/* NAV */
nav {
    backdrop-filter: blur(10px);
    background: rgba(0,0,0,0.4);
    position: sticky;
    top: 0;
    z-index: 1000;
}

nav ul {
    list-style: none;
    display: flex;
    justify-content: center;
    gap: 2em;
    padding: 1em;
    margin: 0;
}

nav ul li a {
    color: white;
    text-decoration: none;
    font-weight: bold;
    padding: 8px 16px;
    border-radius: 25px;
    transition: 0.3s;
}

nav ul li a:hover {
    background: linear-gradient(45deg, var(--verde), var(--azul));
}

/* CONTENEDOR */
.container {
    width: 90%;
    max-width: 1200px;
    margin: 3em auto;
}

/* INTRO */
.intro-section {
    text-align: center;
    margin-bottom: 3em;
}

.intro-section img {
    width: 100%;
    max-width: 500px;
    border-radius: 20px;
    margin-top: 1.5em;
    box-shadow: 0 0 25px rgba(0,255,150,0.5);
}

/* TARJETAS GLASS */
.transport-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 2em;
}

.transport-card {
    background: rgba(255,255,255,0.08);
    border-radius: 20px;
    padding: 1.5em;
    backdrop-filter: blur(10px);
    box-shadow: 0 0 20px rgba(0,255,150,0.2);
    transition: 0.4s;
    opacity: 0;
    transform: translateY(40px);
}

.transport-card:hover {
    transform: translateY(-10px);
    box-shadow: 0 0 30px rgba(0,255,150,0.5);
}

.transport-card img {
    width: 100%;
    border-radius: 15px;
}

.transport-card h3 {
    text-align: center;
    font-family: 'Montserrat', sans-serif;
}

.transport-card ul {
    list-style: none;
    padding: 0;
}

.transport-card ul li::before {
    content: "🌱";
    margin-right: 8px;
}

/* LINKS */
.links-section {
    margin-top: 3em;
    text-align: center;
}

.links-section ul {
    list-style: none;
    padding: 0;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 1em;
}

.links-section ul li {
    background: linear-gradient(45deg, var(--verde), var(--azul));
    padding: 0.8em 1.5em;
    border-radius: 25px;
    transition: 0.3s;
}

.links-section ul li:hover {
    transform: scale(1.1);
}

.links-section ul li a {
    color: white;
    text-decoration: none;
    font-weight: bold;
}

/* FOOTER */
.footer {
    text-align: center;
    padding: 2em;
    margin-top: 3em;
    background: rgba(0,0,0,0.5);
}

/* SCROLL ANIMACIÓN */
html { scroll-behavior: smooth; }

</style>
</head>
