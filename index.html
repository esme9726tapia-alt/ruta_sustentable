<style>

/* FUENTES Y BASE */
body {
    font-family: 'Open Sans', sans-serif;
    margin: 0;
    background: linear-gradient(135deg, #e8f5e9, #e3f2fd);
    color: #333;
    line-height: 1.6;
}

/* HEADER MEJORADO */
header {
    background: linear-gradient(135deg, #2e7d32, #1976d2);
    color: white;
    padding: 3em 1em;
    text-align: center;
    position: relative;
    overflow: hidden;
}

header h1 {
    font-family: 'Montserrat', sans-serif;
    font-size: 3em;
    margin-bottom: 0.3em;
    letter-spacing: 2px;
}

header h2 {
    font-weight: 400;
}

header::after {
    content: "";
    position: absolute;
    bottom: -40px;
    left: 0;
    width: 100%;
    height: 80px;
    background: white;
    border-radius: 50% 50% 0 0;
}

/* NAV MODERNO */
nav {
    background: rgba(46, 125, 50, 0.95);
    backdrop-filter: blur(6px);
    position: sticky;
    top: 0;
    z-index: 1000;
}

nav ul {
    list-style: none;
    display: flex;
    justify-content: center;
    gap: 2em;
    padding: 1em;
    margin: 0;
}

nav ul li a {
    color: white;
    text-decoration: none;
    font-weight: bold;
    font-family: 'Montserrat', sans-serif;
    transition: 0.3s ease;
    padding: 8px 14px;
    border-radius: 20px;
}

nav ul li a:hover {
    background: #90caf9;
    color: #1b5e20;
}

/* CONTENEDOR */
.container {
    width: 90%;
    max-width: 1200px;
    margin: 3em auto;
}

/* INTRO */
.intro-section {
    text-align: center;
    margin-bottom: 4em;
}

.intro-section img {
    width: 100%;
    max-width: 500px;
    border-radius: 20px;
    margin-top: 1.5em;
    box-shadow: 0 15px 35px rgba(0,0,0,0.15);
    transition: transform 0.4s ease;
}

.intro-section img:hover {
    transform: scale(1.05);
}

/* GRID */
.transport-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 2.5em;
}

/* TARJETAS ESTILO APP */
.transport-card {
    background: white;
    border-radius: 25px;
    padding: 1.8em;
    box-shadow: 0 15px 35px rgba(0,0,0,0.08);
    transition: all 0.4s ease;
    position: relative;
    overflow: hidden;
}

.transport-card::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    height: 6px;
    width: 100%;
    background: linear-gradient(to right, #4caf50, #2196f3);
}

.transport-card:hover {
    transform: translateY(-10px);
    box-shadow: 0 25px 45px rgba(0,0,0,0.15);
}

.transport-card img {
    width: 100%;
    border-radius: 15px;
    margin-bottom: 1em;
}

.transport-card h3 {
    text-align: center;
    color: #1565c0;
    font-family: 'Montserrat', sans-serif;
    margin-bottom: 1em;
}

/* LISTAS */
.transport-card ul {
    list-style: none;
    padding: 0;
}

.transport-card ul li {
    margin-bottom: 0.6em;
    padding-left: 1.5em;
    position: relative;
}

.transport-card ul li::before {
    content: "🌱";
    position: absolute;
    left: 0;
}

/* LINKS */
.links-section {
    margin-top: 5em;
    text-align: center;
}

.links-section ul {
    list-style: none;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 1em;
    padding: 0;
}

.links-section ul li {
    background: linear-gradient(135deg, #4caf50, #2196f3);
    padding: 0.9em 1.6em;
    border-radius: 30px;
    transition: 0.3s ease;
}

.links-section ul li:hover {
    transform: scale(1.08);
}

.links-section ul li a {
    color: white;
    text-decoration: none;
    font-weight: bold;
}

/* FOOTER PREMIUM */
.footer {
    background: linear-gradient(135deg, #1b5e20, #0d47a1);
    color: white;
    text-align: center;
    padding: 2em 1em;
    margin-top: 4em;
    font-size: 0.9em;
}

/* SCROLL SUAVE */
html {
    scroll-behavior: smooth;
}

</style>
